<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/fasttv_fav_icon.svg" />
  <link rel="apple-touch-icon" href="/fasttv_fav_icon.svg" />

  <!-- Primary Meta Tags -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastTV – Premium Micro Dramas | 90-Second Episodes</title>
  <meta name="title" content="FastTV – Premium Micro Dramas | 90-Second Episodes" />
  <meta name="description"
    content="Watch premium micro dramas on FastTV. From forbidden love to powerful revenge — every story unfolds in 90-120 seconds. Download the app and start binging now." />
  <meta name="keywords"
    content="FastTV, micro dramas, short episodes, 90 second episodes, streaming, Hungama, short videos, series, mobile entertainment, binge watch" />
  <meta name="author" content="FastTV by Hungama" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />
  <meta name="theme-color" content="#040406" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://fasttv.app/" />
  <meta property="og:title" content="FastTV – Premium Micro Dramas | 90-Second Episodes" />
  <meta property="og:description"
    content="Watch premium micro dramas on FastTV. From forbidden love to powerful revenge — every story unfolds in 90-120 seconds. Download the app and start binging now." />
  <meta property="og:image" content="/fasttv_og_image.png" />
  <meta property="og:site_name" content="FastTV" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://fasttv.app/" />
  <meta name="twitter:title" content="FastTV – Premium Micro Dramas | 90-Second Episodes" />
  <meta name="twitter:description"
    content="Watch premium micro dramas on FastTV. From forbidden love to powerful revenge — every story unfolds in 90-120 seconds." />
  <meta name="twitter:image" content="/fasttv_og_image.png" />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://fasttv.app/" />

  <!-- Structured Data - Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "FastTV",
    "url": "https://fasttv.app",
    "logo": "https://fasttv.app/fasttv_fav_icon.svg",
    "description": "Premium micro dramas from Hungama. Watch 90-second episodes crafted with care.",
    "sameAs": [
      "https://www.instagram.com/fasttv",
      "https://www.facebook.com/fasttv",
      "https://twitter.com/fasttv"
    ]
  }
  </script>

  <!-- Structured Data - WebApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "FastTV",
    "operatingSystem": "iOS, Android",
    "applicationCategory": "EntertainmentApplication",
    "description": "Watch premium micro dramas in 90-120 seconds. Download FastTV for short stories crafted with care.",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "INR"
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "4.5",
      "ratingCount": "10000"
    }
  }
  </script>

  <!-- Structured Data - WebSite with SearchAction -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "FastTV",
    "url": "https://fasttv.app",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://fasttv.app/top-series?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
